name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  # ── macOS Apple Silicon (arm64) ────────────────────────────────────────────
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller rumps pillow
          pip install -r sync/requirements.txt

      - name: Build arm64 .app
        run: python -m PyInstaller kairos.spec --noconfirm

      - name: Create DMG
        run: |
          VERSION="${{ github.ref_name || inputs.version }}"
          hdiutil create \
            -volname "Kairos Agent" \
            -srcfolder dist/Kairos.app \
            -ov -format UDZO \
            "dist/Kairos-${VERSION}-mac-arm64.dmg"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          files: dist/Kairos-*-mac-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── macOS Intel (x86_64 via Rosetta on arm64 runner) ──────────────────────
  build-mac-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install x86_64 Python via Rosetta
        run: |
          curl -fsSL -o /tmp/python-x86.pkg \
            "https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg"
          sudo installer -pkg /tmp/python-x86.pkg -target /

      - name: Install dependencies (x86_64)
        run: |
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11 \
            -m pip install pyinstaller rumps pillow
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11 \
            -m pip install -r sync/requirements.txt

      - name: Build x86_64 .app
        run: |
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11 \
            -m PyInstaller kairos.spec --noconfirm

      - name: Create DMG
        run: |
          VERSION="${{ github.ref_name || inputs.version }}"
          hdiutil create \
            -volname "Kairos Agent" \
            -srcfolder dist/Kairos.app \
            -ov -format UDZO \
            "dist/Kairos-${VERSION}-mac-intel.dmg"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          files: dist/Kairos-*-mac-intel.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows ────────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pystray pillow plyer
          pip install -r sync/requirements.txt

      - name: Build .exe
        run: python -m PyInstaller kairos_win.spec --noconfirm

      - name: Zip output
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          if (-not $VERSION) { $VERSION = "${{ inputs.version }}" }
          Compress-Archive -Path dist\Kairos -DestinationPath "dist\Kairos-${VERSION}-windows.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          files: dist/Kairos-*-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
